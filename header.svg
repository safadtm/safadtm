<svg width="900" height="200" viewBox="0 0 900 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="900" height="200">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .root {
          width: 900px;
          height: 200px;
          background: #0d1117;
          font-family: 'Space Mono', monospace;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 0 52px;
          position: relative;
          overflow: hidden;
        }

        .grid {
          position: absolute;
          inset: 0;
          background-image:
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
          background-size: 40px 40px;
        }

        .glow {
          position: absolute;
          top: -60px;
          left: -60px;
          width: 320px;
          height: 320px;
          background: radial-gradient(circle, rgba(88,166,255,0.12) 0%, transparent 70%);
          animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
          0%, 100% { opacity: 0.6; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.1); }
        }

        .label {
          font-size: 11px;
          letter-spacing: 4px;
          color: #58a6ff;
          text-transform: uppercase;
          margin-bottom: 10px;
          opacity: 0;
          animation: fadeUp 0.6s ease forwards 0.2s;
        }

        .name {
          font-size: 48px;
          font-weight: 700;
          color: #f0f6fc;
          letter-spacing: -1px;
          line-height: 1;
          opacity: 0;
          animation: fadeUp 0.7s ease forwards 0.5s;
        }

        .name span {
          color: #58a6ff;
        }

        .tagline {
          font-size: 12px;
          color: #8b949e;
          margin-top: 12px;
          letter-spacing: 1px;
          opacity: 0;
          animation: fadeUp 0.7s ease forwards 0.8s;
        }

        .line {
          position: absolute;
          bottom: 0;
          left: 0;
          height: 2px;
          width: 0;
          background: linear-gradient(90deg, #58a6ff, transparent);
          animation: lineGrow 1.2s ease forwards 0.3s;
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        @keyframes lineGrow {
          to { width: 100%; }
        }
      </style>
      <div class="root">
        <div class="grid"></div>
        <div class="glow"></div>
        <div class="label">software engineer</div>
        <div class="name">Safad <span>T M</span></div>
        <div class="tagline">Web &amp; Mobile · Flutter · React · Node.js</div>
        <div class="line"></div>
      </div>
    </div>
  </foreignObject>
</svg>
